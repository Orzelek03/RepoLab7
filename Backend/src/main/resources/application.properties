spring.application.name=PASIR_Orlowski_Kacper
spring.config.import=optional:file:.env[.properties]
# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/${MYSQL_DATABASE:nazwisko_imie_grupa_spring}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:user-ni}
spring.datasource.password=${MYSQL_PASSWORD:strongUserPass123!}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
#Server settings
server.address=0.0.0.0
server.port=8080
# GraphQL
spring.graphql.http.path=/graphql
spring.graphql.schema.file-extensions=.graphqls,.gqls, .graphql
app.jwt.secret=${JWT_SECRET}